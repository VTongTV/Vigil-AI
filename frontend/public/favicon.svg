<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0d1f2d"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="glow-grad" x1="24" y1="8" x2="24" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="48" height="48" rx="10" fill="url(#bg-grad)"/>
  <rect width="48" height="48" rx="10" fill="none" stroke="#38bdf8" stroke-width="0.75" stroke-opacity="0.3"/>

  <!-- Shield shape -->
  <path d="M24 7 L38 13 L38 25 C38 33 31 39.5 24 42 C17 39.5 10 33 10 25 L10 13 Z"
        fill="none" stroke="url(#accent-grad)" stroke-width="1.5" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Inner shield fill (subtle) -->
  <path d="M24 9.5 L36 14.5 L36 25 C36 31.8 30 37.5 24 39.8 C18 37.5 12 31.8 12 25 L12 14.5 Z"
        fill="#38bdf8" fill-opacity="0.06"/>

  <!-- Radar rings -->
  <circle cx="24" cy="24" r="5" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.9" fill="none"/>
  <circle cx="24" cy="24" r="9" stroke="#38bdf8" stroke-width="0.6" stroke-opacity="0.5" fill="none"/>
  <circle cx="24" cy="24" r="13" stroke="#38bdf8" stroke-width="0.4" stroke-opacity="0.25" fill="none"/>

  <!-- Center dot -->
  <circle cx="24" cy="24" r="2.5" fill="url(#glow-grad)" filter="url(#glow)"/>

  <!-- Radar sweep line -->
  <line x1="24" y1="24" x2="33" y2="17" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.7" stroke-linecap="round"/>

  <!-- Signal crosshair ticks -->
  <line x1="24" y1="14" x2="24" y2="16" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="34" y1="24" x2="32" y2="24" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="24" y1="34" x2="24" y2="32" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="14" y1="24" x2="16" y2="24" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.5" stroke-linecap="round"/>
</svg>