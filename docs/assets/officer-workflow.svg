<svg width="780" height="140" viewBox="0 0 780 140" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="780" height="140" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="390" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="11" fill="#e2e8f0" letter-spacing="2">OFFICER REVIEW WORKFLOW -- HUMAN-IN-THE-LOOP</text>
  
  <!-- Pending -->
  <rect x="25" y="40" width="105" height="55" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="77" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="9" fill="#fbbf24">PENDING</text>
  <text x="77" y="75" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#64748b">AI detection</text>
  <text x="77" y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#64748b">queued</text>
  
  <!-- Arrow -->
  <line x1="135" y1="67" x2="160" y2="67" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3">
    <animate attributeName="stroke-dashoffset" values="0;-14" dur="1.2s" repeatCount="indefinite"/>
  </line>
  <polygon points="158,63 158,71 166,67" fill="#475569"/>
  
  <!-- Under Review -->
  <rect x="170" y="40" width="120" height="55" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="230" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="9" fill="#60a5fa">UNDER REVIEW</text>
  <text x="230" y="75" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#64748b">Officer examines</text>
  <text x="230" y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#64748b">evidence + plate</text>
  
  <!-- Branch arrows -->
  <line x1="295" y1="55" x2="325" y2="40" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,3">
    <animate attributeName="stroke-dashoffset" values="0;-14" dur="1s" repeatCount="indefinite"/>
  </line>
  <polygon points="323,36 327,44 331,37" fill="#22c55e"/>
  <text x="310" y="34" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="600" font-size="7" fill="#4ade80">APPROVE</text>
  
  <line x1="295" y1="80" x2="325" y2="95" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3">
    <animate attributeName="stroke-dashoffset" values="0;-14" dur="1s" repeatCount="indefinite"/>
  </line>
  <polygon points="323,91 327,99 331,92" fill="#ef4444"/>
  <text x="310" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="600" font-size="7" fill="#f87171">REJECT</text>
  
  <!-- Approved -->
  <rect x="335" y="28" width="120" height="50" rx="6" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="395" y="46" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="9" fill="#4ade80">APPROVED</text>
  <text x="395" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#64748b">Ready for issuance</text>
  <text x="395" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#64748b">E-challan path</text>
  
  <!-- Rejected -->
  <rect x="335" y="85" width="120" height="45" rx="6" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="395" y="103" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="9" fill="#f87171">REJECTED</text>
  <text x="395" y="117" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#64748b">Logged + archived</text>
  
  <!-- Arrow from Approved to Issued -->
  <line x1="460" y1="53" x2="490" y2="53" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3">
    <animate attributeName="stroke-dashoffset" values="0;-14" dur="1.2s" repeatCount="indefinite"/>
  </line>
  <polygon points="488,49 488,57 496,53" fill="#475569"/>
  
  <!-- Issued -->
  <rect x="500" y="28" width="120" height="50" rx="6" fill="#1e293b" stroke="#818cf8" stroke-width="1.5"/>
  <text x="560" y="46" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="9" fill="#a78bfa">ISSUED</text>
  <text x="560" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#64748b">Challan generated</text>
  <text x="560" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#64748b">ASTraM / Vahan</text>
  
  <!-- Audit trail -->
  <rect x="630" y="40" width="135" height="90" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="697" y="58" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="9" fill="#94a3b8">AUDIT TRAIL</text>
  <text x="697" y="74" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#475569">Every action logged</text>
  <text x="697" y="86" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#475569">Officer ID + timestamp</text>
  <text x="697" y="98" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#475569">Reason for rejection</text>
  <text x="697" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#475569">Immutable log entries</text>
  <text x="697" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="600" font-size="7" fill="#64748b">Rule 166A compliant</text>
</svg>
