<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Shield background (pulsing) -->
  <path d="M60 10 L105 28 L105 55 C105 82 85 100 60 108 C35 100 15 82 15 55 L15 28 Z" fill="url(#shieldGrad)" opacity="0.12" stroke="url(#shieldGrad)" stroke-width="1">
    <animate attributeName="opacity" values="0.12;0.22;0.12" dur="3s" repeatCount="indefinite"/>
  </path>
  <!-- Shield border -->
  <path d="M60 10 L105 28 L105 55 C105 82 85 100 60 108 C35 100 15 82 15 55 L15 28 Z" fill="none" stroke="url(#shieldGrad)" stroke-width="2"/>
  <!-- Eye ellipse -->
  <ellipse cx="60" cy="46" rx="24" ry="13" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.8">
    <animate attributeName="ry" values="13;15;13" dur="2s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Eye pupil -->
  <circle cx="60" cy="46" r="5" fill="#6366f1" filter="url(#glow)">
    <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Scan line -->
  <line x1="30" y1="46" x2="90" y2="46" stroke="#3b82f6" stroke-width="1" opacity="0.4">
    <animate attributeName="y1" values="30;65;30" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="30;65;30" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="2.5s" repeatCount="indefinite"/>
  </line>
  <!-- VIGIL text - positioned well inside shield, above narrowing -->
  <text x="60" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="800" font-size="18" fill="url(#shieldGrad)" letter-spacing="3">VIGIL</text>
  <!-- AI subtitle -->
  <text x="60" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="600" font-size="10" fill="#818cf8" letter-spacing="2">AI</text>
</svg>
