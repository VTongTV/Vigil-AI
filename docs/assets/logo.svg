<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <path d="M60 8 L108 28 L108 60 C108 88 86 108 60 116 C34 108 12 88 12 60 L12 28 Z" fill="url(#shieldGrad)" opacity="0.15" stroke="url(#shieldGrad)" stroke-width="1.5">
    <animate attributeName="opacity" values="0.15;0.25;0.15" dur="3s" repeatCount="indefinite"/>
  </path>
  <path d="M60 8 L108 28 L108 60 C108 88 86 108 60 116 C34 108 12 88 12 60 L12 28 Z" fill="none" stroke="url(#shieldGrad)" stroke-width="2"/>
  <ellipse cx="60" cy="52" rx="22" ry="14" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.8">
    <animate attributeName="ry" values="14;16;14" dur="2s" repeatCount="indefinite"/>
  </ellipse>
  <circle cx="60" cy="52" r="6" fill="#6366f1" filter="url(#glow)">
    <animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite"/>
  </circle>
  <line x1="30" y1="52" x2="90" y2="52" stroke="#3b82f6" stroke-width="1" opacity="0.4">
    <animate attributeName="y1" values="35;70;35" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="35;70;35" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="2.5s" repeatCount="indefinite"/>
  </line>
  <text x="60" y="98" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="800" font-size="22" fill="url(#shieldGrad)" letter-spacing="4">VIGIL</text>
</svg>
