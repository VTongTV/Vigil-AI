<svg width="780" height="130" viewBox="0 0 780 130" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="780" height="130" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="390" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="11" fill="#e2e8f0" letter-spacing="2">CONFIDENCE TIERS -- AUDITABLE DETECTION DECISIONS</text>
  
  <!-- High tier -->
  <rect x="30" y="38" width="230" height="75" rx="6" fill="#0a2618" stroke="#22c55e" stroke-width="1.5"/>
  <circle cx="55" cy="60" r="8" fill="#22c55e">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="70" y="64" font-family="system-ui, sans-serif" font-weight="800" font-size="16" fill="#4ade80">HIGH</text>
  <text x="160" y="64" font-family="system-ui, sans-serif" font-weight="600" font-size="12" fill="#64748b">>= 0.80</text>
  <text x="55" y="84" font-family="system-ui, sans-serif" font-size="9" fill="#86efac">Auto-queue for review</text>
  <text x="55" y="100" font-family="system-ui, sans-serif" font-size="8" fill="#475569">FP rate &lt; 5% | Standard officer review</text>
  
  <!-- Medium tier -->
  <rect x="280" y="38" width="230" height="75" rx="6" fill="#1a1600" stroke="#eab308" stroke-width="1.5"/>
  <circle cx="305" cy="60" r="8" fill="#eab308">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="320" y="64" font-family="system-ui, sans-serif" font-weight="800" font-size="16" fill="#fbbf24">MEDIUM</text>
  <text x="420" y="64" font-family="system-ui, sans-serif" font-weight="600" font-size="12" fill="#64748b">0.50-0.79</text>
  <text x="305" y="84" font-family="system-ui, sans-serif" font-size="9" fill="#fde68a">Careful review, check edge cases</text>
  <text x="305" y="100" font-family="system-ui, sans-serif" font-size="8" fill="#475569">FP rate 5-15% | Officer attention needed</text>
  
  <!-- Low tier -->
  <rect x="530" y="38" width="230" height="75" rx="6" fill="#1a0a0a" stroke="#ef4444" stroke-width="1.5"/>
  <circle cx="555" cy="60" r="8" fill="#ef4444">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="570" y="64" font-family="system-ui, sans-serif" font-weight="800" font-size="16" fill="#fca5a5">LOW</text>
  <text x="640" y="64" font-family="system-ui, sans-serif" font-weight="600" font-size="12" fill="#64748b">&lt; 0.50</text>
  <text x="555" y="84" font-family="system-ui, sans-serif" font-size="9" fill="#fca5a5">Manual verification required</text>
  <text x="555" y="100" font-family="system-ui, sans-serif" font-size="8" fill="#475569">FP rate &gt; 15% | May be noise</text>
</svg>
